<!DOCTYPE html>
<html lang="en">
<head>

     <style>
      *{
        padding: 0;
        margin: 0;
      }
      body{
        background-image: linear-gradient(rgba(12, 12, 12, 0.6)),url("cct2.jpg");
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        width: 100%;
        height: 100vh;
      } 
      .nav{
        color: antiquewhite;
        display: flex;
        justify-content: center;
        align-items: center;
        justify-content: center;
        padding: 20px;
        font-family: 'Times New Roman', Times, serif;
        gap: 30px;
      } 
      .nav ul{
        justify-content: space-around;
        display: flex;
        align-items:center;
        text-align: center;
        gap: 40px;
            list-style: none;
            text-decoration: none;
      }
      .nav ul li{
        justify-content: center;
display: flex;
      }
      .nav a{
        font-size: 20px;
        color: white;
        text-transform: uppercase;
         text-decoration: none;
         font-family: sans-serif;
      }
      .nav a:hover{
        cursor: pointer;
        color: rgb(98, 14, 146);
      }   

       .content{
          width: 100%;
          position: absolute;
          top: 50%;
          text-align: center;
          align-items: center;
          color: white;
        }
          .content  h1{
            text-transform: uppercase;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            letter-spacing: 2px;
            color: aqua;
            font-size: 25px;
          }
          .content p{
            font-size: 20px;
            text-transform: capitalize;
            margin-top: 1px;
            line-height: 25px;
            font-weight: 100;
            animation: slide 5s ease-in-out infinite;
          }

          .content button{
            width: 150px;
            padding: 15px 0;
            text-align: center;
            margin-top: 12px;
            margin: 20px 10px;
            border-radius: 25px;
            gap: 40px;
            font-weight: bold;
            border: 1px solid #009688;
            background: transparent;
            color: #009688;
            text-transform: capitalize;
position: relative;
overflow: hidden;
font-size: 14px;
          }.content span{
            background: #090caf;
            height: 100%;
            width: 0;
            position: absolute;
            left: 0;
            bottom: 0;
            z-index: -1;
            transition: 0.5s;
          }
          .content button:hover span{
            width: 100%;
          }
          .content button:hover{
            border: none;
          }
          .content button a{
            text-decoration: none;
            color: white;
          }

          @media screen and (max-width: 768px) {
    
    body {
        height: 100vh;
        background-attachment: scroll; 
    }

    h1 {
        font-size: 28px !important;
        margin-bottom: 10px;
    }

    p {
        font-size: 16px !important;
        padding: 0 20px;
    }

    
    .buttons-container {
        display: flex;
        flex-direction: column; 
        align-items: center;
        gap: 15px;
    }

    
    button, .btn { 
        width: 80%;
        max-width: 250px;
        margin: 5px 0;
    }

    
    .nav ul {
        gap: 15px;
    }
    
    .nav ul li a {
        font-size: 14px;
    }
}

      </style>

</head>
