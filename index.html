<!DOCTYPE html>
<html lang="en">
<head>
    <style>
      *{
        padding: 0;
        margin: 0;
      }
      body{
        background-image: linear-gradient(rgba(35, 46, 172, 0.6)),url("background.jpg");
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        width: 100%;
        height: 100vh;
      } 
      .nav{
        color: antiquewhite;
        display: flex;
        width: 85%;
        margin: auto;
        padding: 35px 0;
        justify-content: space-between;
        align-items: center;
        font-family: 'Times New Roman', Times, serif;
      } 
      .nav ul{
        justify-content: space-around;
        display: flex;
        align-items:end;
        text-align: end;
        gap: 40px;
            list-style: none;
            text-decoration: none;
      }
      .nav ul li{
        justify-content: end;
display: inline-block;
margin: 0 20px;
position: relative;
      }
      .nav a{
        font-size: 20px;
        color: white;
        text-transform: uppercase;
         text-decoration: none;
         font-family: sans-serif;
      }
      .nav a:hover{
        cursor: pointer;
        color: aqua;
      }   
      .nav figure{
        text-align: center;
        align-items: center;
        display: flex;
        gap: 10px;
      }
      .nav figcaption{
        text-align: center;
        justify-content: center;
        align-items: center;
        font-size: 20px;
        text-transform: capitalize;
        color: white;
      }
      .nav img{
        width: 40px;
        height: 40px;
        cursor: pointer;
        border-radius: 50px;
             text-align: center;
        justify-content: center;
        align-items: center;

      }   
      .nav ul li::after{
        content: "";
        height: 3px;
        width: 0;
        background-color: #009688;
        position: absolute;
        left: 0;
        bottom: -10px;
        transition: 0.5s;
      }
        .nav ul li:hover:after{
          width: 100%;
        }
        .content{
          width: 100%;
          position: absolute;
          top: 50%;
          text-align: center;
          align-items: center;
          color: white;
        }
          .content  h1{
            text-transform: uppercase;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            letter-spacing: 2px;
            color:  white;
            font-size: 25px;
          }
          .content div{
            font-size: 20px;
            text-transform: capitalize;
            margin-top: 1px;
            line-height: 25px;
            font-weight: 100;
            animation: slide 5s ease-in-out infinite;
          }
             @keyframes slide {
            from {
                transform: translateX(-100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
                color: aqua;
            }
          }
          .content button{
            width: 200px;
            padding: 15px 0;
            text-align: center;
            margin: 20px 10px;
            border-radius: 25px;
            font-weight: bold;
            border: 2px solid #009688;
            background: transparent;
            color: white;
            text-transform: capitalize;
position: relative;
overflow: hidden;
font-size: 14px;
          }.content span{
            background: #009688;
            height: 100%;
            width: 0;
            border-radius: 25px;
            position: absolute;
            left: 0;
            bottom: 0;
            z-index: -1;
            transition: 0.5s;
          }
          .content button:hover span{
            width: 100%;
          }
          .content button:hover{
            border: none;
          }
          .content button a{
            text-decoration: none;
            color: white;
          }

          @media screen and (max-width: 768px) {
  .nav {
    flex-direction: column;
    padding: 20px 0;
    width: 95%;
  }

  .nav ul {
    margin-top: 20px;
    gap: 15px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .nav ul li {
    margin: 5px 10px;
  }

  .nav a {
    font-size: 16px;
  }

  .content {
    padding: 0 20px;
    top: 60%;
  }

  .content h1 {
    font-size: 28px;
  }

  .content div {
    font-size: 16px;
  }

  .content button {
    width: 160px;
    margin: 10px 5px;
  }
}

</style>
